<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Alou Sanogo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <nav class="nav">
        <a href="index.html" class="logo">Alou Sanogo</a>

        <div class="nav-right">
          <!-- bouton thème (reste visible) -->
          <button id="themeToggle" class="theme-btn">🌙</button>

          <!-- bouton hamburger -->
          <button class="menu-toggle" id="menuToggle">☰</button>
        </div>

        <!-- menu -->
        <div class="nav-links" id="navLinks">
          <a href="index.html">Accueil</a>
          <a href="apropos.html">À propos</a>
          <a href="projets.html">Projets</a>
          <a href="contact.html">Contact</a>
        </div>
      </nav>
    </header>

    <main class="contact">
      <!-- TITRE -->
      <section class="contact-header">
        <h1>Contactez-moi</h1>
        <p>Deux manières simples pour entrer en contact avec moi :</p>
      </section>

      <!-- CONTAINER -->
      <section class="contact-container">
        <!-- FORMULAIRE -->
        <div class="contact-form">
          <h2>Envoyez-moi un message</h2>
          <form id="contactForm">
            <label for="name">Nom</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Votre nom"
              required
            />

            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Votre email"
              required
            />

            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              rows="5"
              placeholder="Votre message..."
              required
            ></textarea>

            <button type="submit" class="btn primary">Envoyer</button>
          </form>
        </div>

        <!-- WHATSAPP -->
        <div class="contact-whatsapp">
          <h2>Contact direct</h2>
          <p>Vous pouvez m'envoyer un message directement sur WhatsApp :</p>
          <a
            href="https://wa.me/89569104"
            target="_blank"
            class="btn secondary"
          >
            💬 WhatsApp
          </a>
        </div>
      </section>
    </main>
    <!-- Formulaire (JS minimal pour alert) -->
    <script>
      const form = document.getElementById("contactForm");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        alert("Merci pour votre message ! Je vous répondrai bientôt.");
        form.reset();
      });
    </script>
    <script src="theme.js"></script>
  </body>
</html>
